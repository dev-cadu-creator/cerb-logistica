<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERB Logística - Calc</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/Logo.png">
    <link rel="apple-touch-icon" href="assets/Logo.png">
</head>
<body>

<div class="card">
    <h2>CERB LOGÍSTICA</h2>
    <p class="subtitle">Calculador de Lucro Real - Voyage G8</p>

    <div class="input-group">
        <label>Valor da Corrida (R$)</label>
        <input type="number" id="valorBruto" placeholder="Ex: 25.50" step="0.01">
    </div>

    <div class="input-group">
        <label>Distância da Rota (KM)</label>
        <input type="number" id="distanciaKM" placeholder="Ex: 12.5" step="0.1">
    </div>

    <button onclick="calcular()">CALCULAR LUCRO</button>

    <div id="resultado" class="hidden">
        <p id="resLucro"></p>
        <p id="resMargem" class="detalhes"></p>
        <strong id="msg"></strong>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
